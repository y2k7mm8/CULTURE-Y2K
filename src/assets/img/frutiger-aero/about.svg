<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="infoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="50%" stop-color="#8BC34A"/>
      <stop offset="100%" stop-color="#CDDC39"/>
    </linearGradient>
    <radialGradient id="infoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4CAF50" stop-opacity="0"/>
    </radialGradient>
    <filter id="infoGlowFilter">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="75" cy="75" r="70" fill="url(#infoGlow)"/>

  <circle cx="75" cy="75" r="50" fill="url(#infoGrad)" opacity="0.7"/>

  <g filter="url(#infoGlowFilter)">
    <circle cx="75" cy="55" r="15" fill="rgba(255,255,255,0.9)"/>
    <rect x="68" y="75" width="14" height="30" rx="7" fill="rgba(255,255,255,0.9)"/>
  </g>

  <ellipse cx="70" cy="50" rx="5" ry="3" fill="rgba(255,255,255,0.6)"/>

  <circle cx="75" cy="75" r="60" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <circle cx="40" cy="40" r="4" fill="#4CAF50" opacity="0.7"/>
  <circle cx="110" cy="35" r="3" fill="#8BC34A" opacity="0.6"/>
  <circle cx="35" cy="125" r="3" fill="#CDDC39" opacity="0.6"/>
  <circle cx="115" cy="130" r="4" fill="#4CAF50" opacity="0.7"/>
  <circle cx="75" cy="20" r="3" fill="#8BC34A" opacity="0.5"/>
  <circle cx="75" cy="135" r="4" fill="#CDDC39" opacity="0.6"/>
</svg>