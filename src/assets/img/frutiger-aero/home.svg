<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="homeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="50%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FFEB3B"/>
    </linearGradient>
    <radialGradient id="homeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0"/>
    </radialGradient>
    <filter id="homeGlowFilter">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="75" cy="75" r="70" fill="url(#homeGlow)"/>

  <g filter="url(#homeGlowFilter)">
    <polygon points="75,25 35,65 115,65" fill="url(#homeGrad)"/>
    <rect x="45" y="65" width="60" height="60" fill="url(#homeGrad)"/>
    <rect x="65" y="85" width="20" height="40" fill="rgba(255,255,255,0.3)"/>
  </g>

  <circle cx="75" cy="75" r="45" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <ellipse cx="65" cy="50" rx="8" ry="4" fill="rgba(255,255,255,0.4)"/>

  <circle cx="35" cy="45" r="3" fill="#FF9800" opacity="0.7"/>
  <circle cx="115" cy="40" r="4" fill="#FFC107" opacity="0.6"/>
  <circle cx="40" cy="130" r="4" fill="#FFEB3B" opacity="0.6"/>
  <circle cx="110" cy="135" r="3" fill="#FF9800" opacity="0.7"/>
</svg>