<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="netGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00BCD4"/>
      <stop offset="50%" stop-color="#00ACC1"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </linearGradient>
    <radialGradient id="netGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00BCD4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0"/>
    </radialGradient>
    <filter id="netGlowFilter">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="75" cy="75" r="70" fill="url(#netGlow)"/>

  <circle cx="75" cy="75" r="55" fill="url(#netGrad)" opacity="0.6"/>

