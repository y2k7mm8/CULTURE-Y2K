<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="musicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#45B7D1"/>
    </linearGradient>
    <radialGradient id="musicGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ECDC4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4ECDC4" stop-opacity="0"/>
    </radialGradient>
    <filter id="musicGlowFilter">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="75" cy="75" r="70" fill="url(#musicGlow)"/>

  <g filter="url(#musicGlowFilter)">
    <ellipse cx="45" cy="110" rx="20" ry="15" fill="#2E7D32"/>
    <ellipse cx="105" cy="105" rx="20" ry="15" fill="#2E7D32"/>
  </g>

  <g filter="url(#musicGlowFilter)">
    <rect x="50" y="40" width="10" height="70" fill="url(#musicGrad)" rx="2"/>
    <rect x="70" y="50" width="10" height="60" fill="url(#musicGrad)" rx="2"/>
    <rect x="90" y="45" width="10" height="65" fill="url(#musicGrad)" rx="2"/>
  </g>

  <circle cx="75" cy="70" r="35" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <ellipse cx="65" cy="55" rx="12" ry="6" fill="rgba(255,255,255,0.4)"/>

  <circle cx="35" cy="45" r="4" fill="#FF6B6B" opacity="0.8"/>
  <circle cx="115" cy="40" r="3" fill="#4ECDC4" opacity="0.7"/>
  <circle cx="40" cy="120" r="3" fill="#45B7D1" opacity="0.6"/>
  <circle cx="110" cy="125" r="4" fill="#FF6B6B" opacity="0.7"/>
</svg>